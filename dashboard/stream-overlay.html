<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100vw; height: 100vh;
    background: transparent;
    overflow: hidden;
    pointer-events: none;
  }

  /* ── Media layer (bottom) ── */
  #media-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
  }
  .media-source {
    position: absolute;
    overflow: hidden;
    display: none;
  }
  .media-source canvas { width: 100%; height: 100%; display: block; }

  /* ── Text layer (top) ── */
  #text-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }
  .txt-source {
    position: absolute;
    display: none;
    pointer-events: none;
    white-space: pre-wrap;
    word-break: break-word;
    overflow: hidden;
  }
  .txt-source.visible { display: block; }

  @keyframes txt-fadein {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes txt-scroll {
    from { transform: translateX(-110%); }
    to   { transform: translateX(110vw); }
  }
</style>
</head>
<body>
<div id="media-layer"></div>
<div id="text-layer"></div>

<script>
// ═══════════════════════════════════════════════════════
// MEDIA OVERLAY (from media-overlay.html)
// ═══════════════════════════════════════════════════════
const mediaLayer = document.getElementById('media-layer');
const mediaSources = {};

function hexToRgb(hex) {
  return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) };
}

function drawFrame(src) {
  const { canvas, ctx, mediaEl, chromaKey, chromaR, chromaG, chromaB, chromaThreshold } = src;
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.drawImage(mediaEl, 0, 0, W, H);
  if (!chromaKey) return;
  const imageData = ctx.getImageData(0, 0, W, H);
  const data = imageData.data;
  const scaled = (chromaThreshold / 100) * 441;
  const tSq = scaled * scaled;
  for (let i = 0; i < data.length; i += 4) {
    const dr = data[i] - chromaR, dg = data[i+1] - chromaG, db = data[i+2] - chromaB;
    if (dr*dr + dg*dg + db*db <= tSq) data[i+3] = 0;
  }
  ctx.putImageData(imageData, 0, 0);
}

function videoChromaLoop(id) {
  const src = mediaSources[id];
  if (!src || src.kind !== 'video' || src.mediaEl.paused || src.mediaEl.ended) return;
  drawFrame(src);
  src.rafId = requestAnimationFrame(() => videoChromaLoop(id));
}

function stopRaf(src) {
  if (src.rafId) { cancelAnimationFrame(src.rafId); src.rafId = null; }
}

function connectMediaSSE() {
  const es = new EventSource('http://localhost:3000/api/video-overlay/stream');
  es.onmessage = (e) => { try { handleMediaCmd(JSON.parse(e.data)); } catch(err) {} };
  es.onerror = () => { es.close(); setTimeout(connectMediaSSE, 2000); };
}

function handleMediaCmd(msg) {
  const id = String(msg.id);
  const { cmd, x, y, w, h } = msg;
  const chroma = { chromaKey: msg.chromaKey || false, chromaColor: msg.chromaColor || '#00ff00', chromaThreshold: msg.chromaThreshold ?? 40 };
  if      (cmd === 'PLAYVID')   playVid(id, msg.path, msg.loops != null ? msg.loops : 1, x, y, w, h, msg.videoStart||0, msg.videoEnd||0, msg.volume ?? 1, chroma);
  else if (cmd === 'CLEARVID')  clearMediaSource(id);
  else if (cmd === 'REMOVEVID') removeMediaSource(id);
  else if (cmd === 'MOVEVID')   moveMediaSource(id, x, y);
  else if (cmd === 'SIZEVID')   sizeMediaSource(id, w, h);
  else if (cmd === 'PLAYIMG')   playImg(id, msg.path, msg.loops != null ? msg.loops : 1, x, y, w, h, msg.displaySeconds||0, chroma);
  else if (cmd === 'CLEARIMG')  clearMediaSource(id);
  else if (cmd === 'REMOVEIMG') removeMediaSource(id);
  else if (cmd === 'MOVEIMG')   moveMediaSource(id, x, y);
  else if (cmd === 'SIZEIMG')   sizeMediaSource(id, w, h);
  else if (cmd === 'PLAYSOUND') playSound(msg.path, msg.startMs||0, msg.endMs||0, msg.id||msg.path, msg.volume??1, msg.isTTS||false, msg.ttsSourceId||null, msg.clearMediaId||null, msg.clearMediaKind||null);
  else if (cmd === 'STOPSOUND') stopSound(String(msg.id));
  else if (cmd === 'STOPALL')   stopAll();
}

const activeSounds = {};

function playSound(filePath, startMs, endMs, id, volume, isTTS, ttsSourceId, clearMediaId, clearMediaKind) {
  id = id !== undefined ? String(id) : undefined;
  const existing = activeSounds[id];
  if (existing) { try { existing.pause(); } catch(e) {} delete activeSounds[id]; }
  const audio = new Audio('http://localhost:3000/api/localfile?path=' + encodeURIComponent(filePath));
  audio.volume = (volume !== undefined && !isNaN(volume)) ? Math.min(1, Math.max(0, volume)) : 1;
  if (id) activeSounds[id] = audio;
  audio.currentTime = startMs / 1000;
  audio.play().catch(() => {});
  function onSoundDone() {
    if (id) delete activeSounds[id];
    if (isTTS && ttsSourceId) {
      fetch('http://localhost:3000/api/video-overlay/done', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ cmd:'TEXTDONE', id:ttsSourceId, clearMediaId:clearMediaId||null, clearMediaKind:clearMediaKind||null }) }).catch(()=>{});
    }
  }
  if (endMs > startMs) {
    const chk = setInterval(() => { if (audio.currentTime >= endMs/1000) { audio.pause(); clearInterval(chk); onSoundDone(); } }, 50);
    audio.addEventListener('ended', () => { clearInterval(chk); onSoundDone(); });
  } else {
    audio.addEventListener('ended', onSoundDone);
  }
}

function createMediaEl(id, kind, x, y, w, h) {
  const el = document.createElement('div');
  el.className = 'media-source';
  el.dataset.id = id;
  const canvas = document.createElement('canvas');
  canvas.width = 1280; canvas.height = 720;
  el.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  const mediaEl = document.createElement(kind === 'video' ? 'video' : 'img');
  mediaEl.style.cssText = 'display:none;position:absolute;top:0;left:0;width:100%;height:100%;object-fit:fill;';
  mediaEl.crossOrigin = 'anonymous';
  if (kind === 'video') mediaEl.preload = 'auto';
  el.appendChild(mediaEl);
  mediaLayer.appendChild(el);
  const px = x||200, py = y||200, pw = w||400, ph = h||300;
  const src = mediaSources[id] = { el, canvas, ctx, mediaEl, kind, loopsTotal:1, loopsDone:0,
    clearTimer:null, videoStart:0, videoEnd:0, chromaKey:false, chromaColor:'#00ff00',
    chromaR:0, chromaG:255, chromaB:0, chromaThreshold:40, rafId:null, x:px, y:py, w:pw, h:ph };
  return src;
}

function applyChromaToSrc(src, chroma) {
  src.chromaKey = chroma.chromaKey || false;
  src.chromaColor = chroma.chromaColor || '#00ff00';
  src.chromaThreshold = chroma.chromaThreshold || 40;
  if (src.chromaKey) { const rgb = hexToRgb(src.chromaColor); src.chromaR = rgb.r; src.chromaG = rgb.g; src.chromaB = rgb.b; }
}

function playVid(id, filePath, loops, x, y, w, h, videoStart, videoEnd, volume, chroma) {
  let src = mediaSources[id];
  if (src && src.kind !== 'video') { removeMediaSource(id); src = null; }
  if (src) {
    stopRaf(src); src.mediaEl.pause(); src.mediaEl.src = ''; src.mediaEl.load(); src.mediaEl.remove();
    const nv = document.createElement('video');
    nv.style.cssText = 'display:none;position:absolute;top:0;left:0;width:100%;height:100%;object-fit:fill;';
    nv.crossOrigin = 'anonymous'; nv.preload = 'auto';
    src.el.appendChild(nv); src.mediaEl = nv; src.loopsDone = 0;
  } else { src = createMediaEl(id, 'video', x, y, w, h); }

  src.mediaEl.addEventListener('timeupdate', () => {
    const end = src.videoEnd;
    if (end > 0 && src.mediaEl.currentTime >= end) {
      src.loopsDone++;
      if (src.loopsTotal === 0 || src.loopsDone < src.loopsTotal) { src.mediaEl.currentTime = src.videoStart||0; src.mediaEl.play(); }
      else { stopRaf(src); clearMediaSource(id); notifyMediaDone(id); }
    }
  });
  src.mediaEl.addEventListener('ended', () => {
    src.loopsDone++;
    if (src.loopsTotal === 0 || src.loopsDone < src.loopsTotal) { src.mediaEl.currentTime = src.videoStart||0; src.mediaEl.play(); }
    else { stopRaf(src); clearMediaSource(id); notifyMediaDone(id); }
  });

  applyChromaToSrc(src, chroma);
  src.loopsTotal = loops; src.loopsDone = 0;
  src.videoStart = videoStart||0; src.videoEnd = videoEnd||0;
  if (x !== undefined) src.x = x; if (y !== undefined) src.y = y;
  if (w !== undefined) src.w = w; if (h !== undefined) src.h = h;
  src.mediaEl.src = filePath.startsWith('http') ? filePath : ('http://localhost:3000/api/localfile?path=' + encodeURIComponent(filePath));
  src.mediaEl.volume = (volume !== undefined && !isNaN(volume)) ? Math.min(1, Math.max(0, volume)) : 1;
  applyMediaPos(src);
  src.el.style.display = 'block';

  const startPlay = () => {
    if (src.chromaKey) { src.mediaEl.style.display = 'none'; src.canvas.style.display = 'block'; videoChromaLoop(id); }
    else { src.canvas.style.display = 'none'; src.mediaEl.style.display = 'block'; }
  };
  if (src.videoStart > 0) {
    src.mediaEl.addEventListener('loadedmetadata', function onMeta() {
      src.mediaEl.removeEventListener('loadedmetadata', onMeta);
      src.mediaEl.currentTime = src.videoStart;
      src.mediaEl.play().catch(()=>{}).then(startPlay);
    });
  } else { src.mediaEl.currentTime = 0; src.mediaEl.play().catch(()=>{}).then(startPlay); }
}

function playImg(id, filePath, loops, x, y, w, h, displaySeconds, chroma) {
  const isGif = filePath.toLowerCase().includes('.gif') || (filePath.startsWith('http') && !filePath.toLowerCase().match(/\.(png|jpe?g|webp|bmp)(\?|$)/));
  let src = mediaSources[id];
  if (src && src.kind !== 'image') { removeMediaSource(id); src = null; }
  if (src) { if (src.clearTimer) { clearTimeout(src.clearTimer); src.clearTimer = null; } src.loopsDone = 0; }
  else { src = createMediaEl(id, 'image', x, y, w, h); }
  applyChromaToSrc(src, chroma);
  src.loopsTotal = loops; src.loopsDone = 0; src.isGif = isGif;
  if (x !== undefined) src.x = x; if (y !== undefined) src.y = y;
  if (w !== undefined) src.w = w; if (h !== undefined) src.h = h;
  if (isGif) {
    const existing = src.el.querySelector('img.gif-el'); if (existing) existing.remove();
    const gifImg = document.createElement('img');
    gifImg.className = 'gif-el';
    gifImg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;object-fit:fill;display:block;';
    gifImg.src = filePath.startsWith('http') ? filePath : ('http://localhost:3000/api/localfile?path=' + encodeURIComponent(filePath));
    src.el.appendChild(gifImg);
    src.canvas.style.display = 'none'; src.gifImg = gifImg;
  } else {
    if (src.gifImg) { src.gifImg.remove(); src.gifImg = null; }
    src.canvas.style.display = 'block'; src.mediaEl.style.display = 'none';
    src.mediaEl.onload = () => { drawFrame(src); };
    src.mediaEl.src = filePath.startsWith('http') ? filePath : ('http://localhost:3000/api/localfile?path=' + encodeURIComponent(filePath));
  }
  applyMediaPos(src);
  src.el.style.display = 'block';
  if (displaySeconds > 0) {
    src.clearTimer = setTimeout(() => { clearMediaSource(id); notifyMediaDone(id); }, displaySeconds * 1000);
  }
}

function stopSound(id) { const a = activeSounds[id]; if (a) { try { a.pause(); } catch(e) {} delete activeSounds[id]; } }
function stopAll() { Object.keys(mediaSources).forEach(id => clearMediaSource(id)); Object.values(activeSounds).forEach(a => { try { a.pause(); } catch(e) {} }); for (const k in activeSounds) delete activeSounds[k]; }

function clearMediaSource(id) {
  const src = mediaSources[id]; if (!src) return;
  stopRaf(src);
  if (src.clearTimer) { clearTimeout(src.clearTimer); src.clearTimer = null; }
  if (src.kind === 'video') { src.mediaEl.pause(); src.mediaEl.src = ''; }
  else { src.mediaEl.src = ''; src.mediaEl.style.display = 'none'; }
  if (src.gifImg) { src.gifImg.src = ''; src.gifImg.style.display = 'none'; }
  src.ctx.clearRect(0, 0, src.canvas.width, src.canvas.height);
  src.canvas.style.display = 'block';
  src.el.style.display = 'none';
}

function removeMediaSource(id) {
  const src = mediaSources[id]; if (!src) return;
  clearMediaSource(id); src.mediaEl.remove(); src.el.remove(); delete mediaSources[id];
}
function moveMediaSource(id, x, y) { const src = mediaSources[id]; if (!src) return; src.x = x; src.y = y; applyMediaPos(src); }
function sizeMediaSource(id, w, h) { const src = mediaSources[id]; if (!src) return; src.w = w; src.h = h; applyMediaPos(src); }
function applyMediaPos(src) { src.el.style.left=(src.x||0)+'px'; src.el.style.top=(src.y||0)+'px'; src.el.style.width=(src.w||400)+'px'; src.el.style.height=(src.h||300)+'px'; }
function notifyMediaDone(id) {
  fetch('http://localhost:3000/api/video-overlay/done', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id}) }).catch(()=>{});
}

// ═══════════════════════════════════════════════════════
// TEXT OVERLAY (from text-overlay.html)
// ═══════════════════════════════════════════════════════
const textLayer = document.getElementById('text-layer');
const textSources = {};

let voicesLoaded = [];
function loadVoices() { voicesLoaded = window.speechSynthesis.getVoices(); }
loadVoices();
window.speechSynthesis.onvoiceschanged = loadVoices;

function getVoice(name) {
  if (!name) return null;
  return voicesLoaded.find(v => v.name === name) || null;
}

function connectTextSSE() {
  const es = new EventSource('http://localhost:3000/api/text-overlay/stream');
  es.onmessage = (e) => { try { handleTextCmd(JSON.parse(e.data)); } catch(err) {} };
  es.onerror = () => { es.close(); setTimeout(connectTextSSE, 2000); };
}

function handleTextCmd(msg) {
  const id = String(msg.id);
  if      (msg.cmd === 'ADDTEXT')    addText(id, msg);
  else if (msg.cmd === 'CLEARTEXT')  clearText(id);
  else if (msg.cmd === 'REMOVETEXT') removeText(id);
  else if (msg.cmd === 'MOVETEXT')   moveText(id, msg.x, msg.y);
  else if (msg.cmd === 'GETVOICES')  sendVoices();
}

function sendVoices() {
  const voices = voicesLoaded.map(v => ({ name:v.name, lang:v.lang }));
  fetch('http://localhost:3000/api/text-overlay/voices', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({voices}) }).catch(()=>{});
}

function addText(id, cfg) {
  if (textSources[id]) removeText(id);
  if (cfg.speakOnly) {
    // Voice only — no visible element, just TTS
    textSources[id] = { cfg, el: null };
    speakText(id, cfg);
    return;
  }

  const el = document.createElement('div');
  el.className = 'txt-source';
  el.dataset.id = id;
  el.style.left       = (cfg.x || 100) + 'px';
  el.style.top        = (cfg.y || 100) + 'px';
  el.style.maxWidth   = (cfg.maxW || 600) + 'px';
  el.style.maxHeight  = (cfg.maxH || 0) > 0 ? cfg.maxH + 'px' : '';
  el.style.overflow   = (cfg.maxH || 0) > 0 ? 'hidden' : '';
  el.style.fontFamily = cfg.font || 'Arial';
  el.style.fontSize   = (cfg.size || 32) + 'px';
  el.style.color      = cfg.color || '#ffffff';
  el.style.fontWeight = cfg.bold   ? 'bold'   : 'normal';
  el.style.fontStyle  = cfg.italic ? 'italic' : 'normal';
  el.style.textShadow = cfg.shadow ? '2px 2px 6px rgba(0,0,0,0.8)' : 'none';
  el.style.lineHeight = '1.2';
  el.textContent = cfg.text || '';
  textLayer.appendChild(el);
  textSources[id] = { el, cfg };

  if ((cfg.maxH || 0) > 0) {
    el.style.visibility = 'hidden'; el.style.display = 'block';
    el.style.maxHeight = ''; el.style.overflow = 'visible';
    let fontSize = cfg.size || 32;
    while (el.scrollHeight > cfg.maxH && fontSize > 6) { fontSize -= 0.5; el.style.fontSize = fontSize + 'px'; }
    el.style.maxHeight = cfg.maxH + 'px'; el.style.overflow = 'hidden';
    el.style.display = ''; el.style.visibility = '';
  }

  const anim = cfg.animation || 'static';
  el.classList.add('visible');
  if (anim === 'fade') {
    el.style.opacity = '0';
    el.style.animation = 'txt-fadein ' + (cfg.animDuration || 1) + 's ease forwards';
  } else if (anim === 'typewriter') {
    const full = cfg.text || ''; el.textContent = ''; el.style.opacity = '1'; let i = 0;
    const speed = cfg.animDuration ? Math.round((cfg.animDuration * 1000) / full.length) : 50;
    const timer = setInterval(() => { el.textContent = full.slice(0, ++i); if (i >= full.length) clearInterval(timer); }, speed);
    textSources[id].typeTimer = timer;
  } else if (anim === 'scroll') {
    el.style.top = (cfg.y || 100) + 'px'; el.style.left = '0px'; el.style.maxWidth = 'none'; el.style.whiteSpace = 'nowrap';
    el.style.animation = 'txt-scroll ' + (cfg.animDuration || 8) + 's linear forwards';
    el.addEventListener('animationend', () => { el.style.animation = 'none'; el.style.transform = 'none'; el.style.left = (cfg.x || 100) + 'px'; }, { once:true });
  } else { el.style.opacity = '1'; }

  if (cfg.speak && cfg.text) speakText(id, cfg);
}

function speakText(id, cfg) {
  const isTTSMonster = (cfg.voice || '').startsWith('ttsm:');
  if (isTTSMonster) {
    fetch('http://localhost:3000/api/tts/speak', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text:cfg.text, voice:cfg.voice, ttsVolume:cfg.ttsVolume??1, id:cfg.id,
        clearMediaId:cfg.clearMediaId||null, clearMediaKind:cfg.clearMediaKind||null }) })
      .then(r => r.json()).then(data => { if (!data.ok) setTimeout(() => { if (textSources[id]) clearText(id); }, 3000); })
      .catch(() => setTimeout(() => { if (textSources[id]) clearText(id); }, 3000));
    return;
  }

  window.speechSynthesis.cancel();
  const voiceName = (cfg.voice || '').replace(/^win:/, '');
  const utt = new SpeechSynthesisUtterance(cfg.text);
  const v = getVoice(voiceName); if (v) utt.voice = v;
  utt.rate   = cfg.ttsRate   || 1;
  utt.pitch  = cfg.ttsPitch  || 1;
  utt.volume = (cfg.ttsVolume !== undefined && !isNaN(cfg.ttsVolume)) ? Math.min(1, Math.max(0, cfg.ttsVolume)) : 1;

  const onDone = () => {
    if (!textSources[id]) return;
    clearText(id);
    fetch('http://localhost:3000/api/video-overlay/done', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ cmd:'TEXTDONE', id:cfg.id, clearMediaId:cfg.clearMediaId||null, clearMediaKind:cfg.clearMediaKind||null }) }).catch(()=>{});
  };

  utt.onend = onDone;
  window.speechSynthesis.speak(utt);
  if (textSources[id]) textSources[id].utt = utt;

  const poll = setInterval(() => {
    if (!window.speechSynthesis.speaking && !window.speechSynthesis.pending) {
      clearInterval(poll);
      if (textSources[id]) textSources[id].pollInterval = null;
      onDone();
    }
  }, 200);
  if (textSources[id]) textSources[id].pollInterval = poll;
}

function clearText(id) {
  const src = textSources[id]; if (!src) return;
  if (src.typeTimer) clearInterval(src.typeTimer);
  if (src.pollInterval) { clearInterval(src.pollInterval); src.pollInterval = null; }
  if (src.cfg && src.cfg.speak) window.speechSynthesis.cancel();
  if (src.el) { src.el.classList.remove('visible'); src.el.style.display = 'none'; }
}

function removeText(id) {
  const src = textSources[id]; if (!src) return;
  if (src.typeTimer) clearInterval(src.typeTimer);
  if (src.pollInterval) { clearInterval(src.pollInterval); src.pollInterval = null; }
  if (src.cfg && src.cfg.speak) window.speechSynthesis.cancel();
  if (src.el) src.el.remove();
  delete textSources[id];
}

function moveText(id, x, y) {
  const src = textSources[id]; if (!src || !src.el) return;
  src.el.style.left = x + 'px'; src.el.style.top = y + 'px';
  src.cfg.x = x; src.cfg.y = y;
}

// ═══════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════
// Signal media overlay ready
fetch('http://localhost:3000/api/video-overlay/done', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({type:'ready'}) }).catch(()=>{});

connectMediaSSE();
connectTextSSE();
</script>
</body>
</html>
