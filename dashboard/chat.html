<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0e0e10;
    --surface: #18181b;
    --surface-raised: #1f1f23;
    --surface-hover: #26262c;
    --border: #2a2a35;
    --text: #efeff1;
    --muted: #adadb8;
    --muted-2: #6b6b7a;
    --accent: #9147ff;
    --accent-hover: #a970ff;
    --accent-soft: rgba(145,71,255,0.15);
    --green: #00c853;
    --green-soft: rgba(0,200,83,0.12);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    overflow: hidden;
    user-select: none;
    -webkit-app-region: no-drag;
  }

  .chat-window {
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  /* Drag region — title bar only */
  .chat-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    cursor: grab;
    -webkit-app-region: drag;
    flex-shrink: 0;
  }

  .chat-header:active { cursor: grabbing; }

  .chat-header-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px rgba(0,200,83,0.5);
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  .chat-header-dot.offline {
    background: var(--muted-2);
    box-shadow: none;
    animation: none;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .chat-header-title {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.3px;
  }

  .chat-header-channel {
    font-size: 0.7rem;
    color: var(--muted-2);
  }

  /* Buttons must opt out of drag region */
  .chat-header-btns {
    display: flex;
    gap: 4px;
    margin-left: auto;
    -webkit-app-region: no-drag;
  }

  .chat-hbtn {
    background: none;
    border: none;
    color: var(--muted-2);
    font-size: 0.75rem;
    cursor: pointer;
    padding: 3px 7px;
    border-radius: 4px;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
    line-height: 1;
  }

  .chat-hbtn:hover { background: var(--surface-hover); color: var(--text); }

  .chat-body {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 1px;
    scroll-behavior: smooth;
  }

  .chat-body::-webkit-scrollbar { width: 3px; }
  .chat-body::-webkit-scrollbar-track { background: transparent; }
  .chat-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .chat-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    font-size: 0.7rem;
    color: var(--muted-2);
  }

  .chat-msg {
    font-size: 0.78rem;
    line-height: 1.55;
    padding: 3px 0;
    border-bottom: 1px solid rgba(42,42,53,0.5);
    word-break: break-word;
  }

  .chat-msg-bot {
    background: var(--green-soft);
    border-radius: 4px;
    padding: 3px 8px;
    border-bottom: none;
  }

  .chat-msg-badges { margin-right: 3px; font-size: 0.7rem; }
  .chat-msg-user { font-weight: 600; }
  .chat-msg-text { color: var(--muted); }
  .chat-msg-ts { font-size: 0.6rem; color: var(--muted-2); margin-left: 6px; }

  .chat-input-row {
    display: flex;
    gap: 6px;
    padding: 10px 12px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    -webkit-app-region: no-drag;
  }

  .chat-input {
    flex: 1;
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.2s;
  }

  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--muted-2); }

  .chat-send-btn {
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-size: 0.85rem;
    width: 34px;
    cursor: pointer;
    transition: background 0.2s;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .chat-send-btn:hover { background: var(--accent-hover); }
</style>
</head>
<body>

<div class="chat-window">
  <div class="chat-header" id="chatDragHandle">
    <div class="chat-header-dot offline" id="chatDot"></div>
    <div class="chat-header-title">Live Chat</div>
    <div class="chat-header-channel" id="chatChannel">—</div>
    <div class="chat-header-btns">
      <button class="chat-hbtn" id="alwaysOnTopBtn" onclick="toggleAlwaysOnTop()" title="Always on top">📌</button>
      <button class="chat-hbtn" onclick="fetch('/api/chat/close',{method:'POST'})" title="Close">✕</button>
    </div>
  </div>

  <div class="chat-body" id="chatBody">
    <div class="chat-empty" id="chatEmpty">
      <span>Waiting for chat...</span>
    </div>
  </div>

  <div class="chat-input-row">
    <input class="chat-input" id="chatInput" placeholder="Send a message..." maxlength="500"
      onkeydown="if(event.key==='Enter') sendChatMessage()" />
    <button class="chat-send-btn" onclick="sendChatMessage()">↑</button>
  </div>
</div>

<script>
  const chatBody  = document.getElementById('chatBody');
  const chatEmpty = document.getElementById('chatEmpty');
  const chatDot   = document.getElementById('chatDot');
  const chatChannel = document.getElementById('chatChannel');
  const MAX_MSGS  = 150;
  let alwaysOnTop = true;

  fetch('/api/config').then(r => r.json()).then(cfg => {
    if (cfg.channel) chatChannel.textContent = '#' + cfg.channel.replace('#','');
  });

  // SSE
  let chatSource = null;

  function connectChatStream() {
    if (chatSource) { chatSource.close(); chatSource = null; }
    chatSource = new EventSource('/api/chat/stream');
    chatSource.onopen = () => { chatDot.classList.remove('offline'); };
    chatSource.onmessage = (e) => {
      try { appendChatMessage(JSON.parse(e.data)); } catch(err) {}
    };
    chatSource.onerror = () => {
      chatDot.classList.add('offline');
      chatSource.close(); chatSource = null;
      setTimeout(connectChatStream, 3000);
    };
  }

  function appendChatMessage(msg) {
    if (chatBody.children.length > MAX_MSGS) chatBody.removeChild(chatBody.firstChild);
    if (chatEmpty && chatEmpty.parentNode) chatEmpty.remove();

    const time = new Date(msg.ts).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
    const color = msg.isBot ? '#4fffb0' : (msg.color || '#d0f0ff');
    const badgeStr = msg.isBot ? '🤖 ' : (msg.isMod ? '🛡️ ' : (msg.isSub ? '⭐ ' : ''));

    const el = document.createElement('div');
    el.className = 'chat-msg' + (msg.isBot ? ' chat-msg-bot' : '');
    el.innerHTML = `<span class="chat-msg-badges">${badgeStr}</span><span class="chat-msg-user" style="color:${color}">${escapeHtml(msg.username)}</span><span style="color:rgba(255,255,255,0.3)">: </span><span class="chat-msg-text">${escapeHtml(msg.message)}</span><span class="chat-msg-ts">${time}</span>`;
    chatBody.appendChild(el);
    chatBody.scrollTop = chatBody.scrollHeight;
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function sendChatMessage() {
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    await fetch('/api/chat/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg })
    });
  }

  async function toggleAlwaysOnTop() {
    alwaysOnTop = !alwaysOnTop;
    await fetch('/api/chat/always-on-top', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ value: alwaysOnTop })
    });
    document.getElementById('alwaysOnTopBtn').style.opacity = alwaysOnTop ? '1' : '0.3';
  }

  connectChatStream();
</script>
</body>
</html>
