<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0e0e10;
    --surface: #18181b;
    --surface-raised: #1f1f23;
    --surface-hover: #26262c;
    --border: #2a2a35;
    --text: #efeff1;
    --muted: #adadb8;
    --muted-2: #6b6b7a;
    --accent: #9147ff;
    --accent-hover: #a970ff;
    --accent-soft: rgba(145,71,255,0.15);
    --green: #00c853;
    --green-soft: rgba(0,200,83,0.12);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    overflow: hidden;
    user-select: none;
    -webkit-app-region: no-drag;
  }

  .chat-window {
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  /* Drag region — title bar only */
  .chat-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    cursor: grab;
    -webkit-app-region: drag;
    flex-shrink: 0;
  }

  .chat-header:active { cursor: grabbing; }

  .chat-header-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px rgba(0,200,83,0.5);
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  .chat-header-dot.offline {
    background: var(--muted-2);
    box-shadow: none;
    animation: none;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .chat-header-title {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.3px;
  }

  .chat-header-channel {
    font-size: 0.7rem;
    color: var(--muted-2);
  }

  /* Buttons must opt out of drag region */
  .chat-header-btns {
    display: flex;
    gap: 4px;
    margin-left: auto;
    -webkit-app-region: no-drag;
  }

  .chat-hbtn {
    background: none;
    border: none;
    color: var(--muted-2);
    font-size: 0.75rem;
    cursor: pointer;
    padding: 3px 7px;
    border-radius: 4px;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
    line-height: 1;
  }

  .chat-hbtn:hover { background: var(--surface-hover); color: var(--text); }

  .chat-body {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 1px;
    scroll-behavior: smooth;
  }

  .chat-body::-webkit-scrollbar { width: 3px; }
  .chat-body::-webkit-scrollbar-track { background: transparent; }
  .chat-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .chat-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    font-size: 0.7rem;
    color: var(--muted-2);
  }

  .chat-msg {
    font-size: 0.78rem;
    line-height: 1.55;
    padding: 3px 0;
    border-bottom: 1px solid rgba(42,42,53,0.5);
    word-break: break-word;
  }

  .chat-msg-bot {
    background: var(--green-soft);
    border-radius: 4px;
    padding: 3px 8px;
    border-bottom: none;
  }

  .chat-msg-badges { margin-right: 3px; font-size: 0.7rem; }
  .chat-msg-user { font-weight: 600; }
  .chat-msg-text { color: var(--muted); }
  .chat-msg-ts { font-size: 0.6rem; color: var(--muted-2); margin-left: 6px; }

  .chat-input-row {
    display: flex;
    gap: 6px;
    padding: 10px 12px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    -webkit-app-region: no-drag;
  }

  .chat-input {
    flex: 1;
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.2s;
  }

  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--muted-2); }

  .chat-send-btn {
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-size: 0.85rem;
    width: 34px;
    cursor: pointer;
    transition: background 0.2s;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .chat-send-btn:hover { background: var(--accent-hover); }

  /* ── First Timers handle ── */
  .app-wrap {
    display: flex;
    flex-direction: row;
    height: 100vh;
    overflow: hidden;
  }
  .chat-window {
    flex: 1;
    min-width: 0;
  }
  .first-timers {
    width: 180px;
    flex-shrink: 0;
    display: none;
    flex-direction: column;
    background: var(--surface);
    border-left: 1px solid var(--border);
    border-radius: 0 8px 8px 0;
    overflow: hidden;
  }
  .first-timers.open { display: flex; }
  .ft-resize {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 5px;
    cursor: ew-resize;
    z-index: 10;
    background: transparent;
  }
  .ft-resize:hover { background: rgba(145,71,255,0.3); }
  .first-timers { position: relative; }
  .ft-header {
    padding: 6px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    color: var(--muted-2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
    -webkit-app-region: drag;
  }
  .ft-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); opacity: 0.7; flex-shrink: 0; }
  .ft-badge { margin-left: auto; background: var(--accent-soft); color: var(--accent-hover); font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 700; display: none; }
  .ft-body { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
  .ft-empty { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--muted-2); padding: 16px 10px; text-align: center; line-height: 1.6; }
  .ft-entry { padding: 6px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.1s; }
  .ft-entry:last-child { border-bottom: none; }
  .ft-entry:hover { background: rgba(255,255,255,0.03); }
  .ft-user { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
  .ft-msg { font-size: 11px; color: var(--muted); line-height: 1.4; word-break: break-word; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .ft-time { font-size: 10px; color: var(--muted-2); margin-top: 3px; }
</style>
</head>
<body>

<div class="app-wrap">
<div class="chat-window">
  <div class="chat-header" id="chatDragHandle">
    <div class="chat-header-dot offline" id="chatDot"></div>
    <div class="chat-header-title">Live Chat</div>
    <div class="chat-header-channel" id="chatChannel">—</div>
    <div class="chat-header-btns">
      <button class="chat-hbtn" id="alwaysOnTopBtn" onclick="toggleAlwaysOnTop()" title="Always on top">📌</button>
      <button class="chat-hbtn" id="ftToggleBtn" onclick="toggleFirstTimers()" title="First timers">👋</button>
      <button class="chat-hbtn" onclick="fetch('/api/chat/close',{method:'POST'})" title="Close">✕</button>
    </div>
  </div>

  <div class="chat-body" id="chatBody">
    <div class="chat-empty" id="chatEmpty">
      <span>Waiting for chat...</span>
    </div>
  </div>

  <div class="chat-input-row">
    <input class="chat-input" id="chatInput" placeholder="Send a message..." maxlength="500"
      onkeydown="if(event.key==='Enter') sendChatMessage()" />
    <button class="chat-send-btn" onclick="sendChatMessage()">↑</button>
  </div>
</div>

<div class="first-timers" id="firstTimersPanel">
  <div class="ft-header" id="ftHeader">
    <div class="ft-dot"></div>
    First Timers
    <span class="ft-badge" id="ftBadge">0</span>
  </div>
  <div class="ft-body" id="ftBody">
    <div class="ft-empty">New chatters<br>will appear here</div>
  </div>
</div>

</div><!-- end app-wrap -->

<script>
  const chatBody  = document.getElementById('chatBody');
  const chatEmpty = document.getElementById('chatEmpty');
  const chatDot   = document.getElementById('chatDot');
  const chatChannel = document.getElementById('chatChannel');
  const MAX_MSGS  = 150;
  let alwaysOnTop = true;

  fetch('/api/config').then(r => r.json()).then(cfg => {
    if (cfg.channel) chatChannel.textContent = '#' + cfg.channel.replace('#','');
  });

  // SSE
  let chatSource = null;

  function connectChatStream() {
    if (chatSource) { chatSource.close(); chatSource = null; }
    chatSource = new EventSource('/api/chat/stream');
    chatSource.onopen = () => { chatDot.classList.remove('offline'); };
    chatSource.onmessage = (e) => {
      try { appendChatMessage(JSON.parse(e.data)); } catch(err) {}
    };
    chatSource.onerror = () => {
      chatDot.classList.add('offline');
      chatSource.close(); chatSource = null;
      setTimeout(connectChatStream, 3000);
    };
  }

  function appendChatMessage(msg) {
    if (chatBody.children.length > MAX_MSGS) chatBody.removeChild(chatBody.firstChild);
    if (chatEmpty && chatEmpty.parentNode) chatEmpty.remove();

    const time = new Date(msg.ts).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
    const color = msg.isBot ? '#4fffb0' : (msg.color || '#d0f0ff');
    const badgeStr = msg.isBot ? '🤖 ' : (msg.isMod ? '🛡️ ' : (msg.isSub ? '⭐ ' : ''));

    const el = document.createElement('div');
    el.className = 'chat-msg' + (msg.isBot ? ' chat-msg-bot' : '');
    el.innerHTML = `<span class="chat-msg-badges">${badgeStr}</span><span class="chat-msg-user" style="color:${color}">${escapeHtml(msg.username)}</span><span style="color:rgba(255,255,255,0.3)">: </span><span class="chat-msg-text">${escapeHtml(msg.message)}</span><span class="chat-msg-ts">${time}</span>`;
    chatBody.appendChild(el);
    chatBody.scrollTop = chatBody.scrollHeight;
    checkFirstTimer(msg);
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function sendChatMessage() {
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    await fetch('/api/chat/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg })
    });
  }

  async function toggleAlwaysOnTop() {
    alwaysOnTop = !alwaysOnTop;
    await fetch('/api/chat/always-on-top', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ value: alwaysOnTop })
    });
    document.getElementById('alwaysOnTopBtn').style.opacity = alwaysOnTop ? '1' : '0.3';
  }


  // ── First Timers ──────────────────────────────────────────────────────────
  const ftBody = document.getElementById('ftBody');
  const ftBadge = document.getElementById('ftBadge');
  const seenChatters = new Set();
  const firstTimers = [];

  function checkFirstTimer(msg) {
    if (msg.isBot) return;
    const user = (msg.username || '').toLowerCase();
    if (seenChatters.has(user)) return;
    seenChatters.add(user);
    const time = new Date(msg.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    firstTimers.unshift({ username: msg.username, message: msg.message, color: msg.color || '#d0f0ff', time });
    if (firstTimers.length > 50) firstTimers.pop();
    renderFirstTimers();
    ftBadge.textContent = firstTimers.length;
    ftBadge.style.display = 'inline-block';
  }

  function renderFirstTimers() {
    if (!firstTimers.length) {
      ftBody.innerHTML = '<div class="ft-empty">New chatters<br>will appear here</div>';
      return;
    }
    ftBody.innerHTML = firstTimers.map(ft => `
      <div class="ft-entry">
        <div class="ft-user" style="color:${ft.color}">${escapeHtml(ft.username)}</div>
        <div class="ft-msg">${escapeHtml(ft.message)}</div>
        <div class="ft-time">${ft.time}</div>
      </div>
    `).join('');
  }

  // ── First timers resize ───────────────────────────────────────────────────
  const ftPanel = document.getElementById('firstTimersPanel');
  let ftResizing = false, ftStartX = 0, ftStartW = 0;

  // inject resize handle
  const ftResizeEl = document.createElement('div');
  ftResizeEl.className = 'ft-resize';
  ftPanel.appendChild(ftResizeEl);

  ftResizeEl.addEventListener('mousedown', (e) => {
    ftResizing = true;
    ftStartX = e.clientX;
    ftStartW = ftPanel.offsetWidth || 180;
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!ftResizing) return;
    const dx = ftStartX - e.clientX;
    const newW = Math.max(140, Math.min(400, ftStartW + dx));
    ftPanel.style.width = newW + 'px';
  });

  document.addEventListener('mouseup', () => { ftResizing = false; });

  function toggleFirstTimers() {
    const panel = document.querySelector('.first-timers');
    const btn = document.getElementById('ftToggleBtn');
    const isOpen = panel.classList.toggle('open');
    if (isOpen && !panel.style.width) panel.style.width = '180px';
    btn.style.opacity = isOpen ? '1' : '0.4';
    btn.style.color = isOpen ? 'var(--accent)' : '';
  }

  connectChatStream();
</script>
</body>
</html>
