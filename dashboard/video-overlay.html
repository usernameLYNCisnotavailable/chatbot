<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100vw; height: 100vh;
    background: transparent;
    overflow: hidden;
  }
  .vid-source {
    position: absolute;
    overflow: hidden;
    display: none;
  }
  .vid-source video {
    width: 100%; height: 100%;
    object-fit: fill;
    display: block;
  }
  /* Resize handle */
  .vid-source .resize-handle {
    position: absolute;
    bottom: 0; right: 0;
    width: 20px; height: 20px;
    background: rgba(255,255,255,0.8);
    cursor: se-resize;
  }
  /* Border when visible */
  .vid-source.visible {
    outline: 1.5px solid rgba(255,255,255,0.55);
  }
</style>
</head>
<body>
<script>
const sources = {}; // id -> { el, videoEl, loopsTotal, loopsDone, x, y, w, h }

let dragging = null, resizing = null;
let dragOffX = 0, dragOffY = 0;

// ---- SSE connection ----
function connectSSE() {
  const es = new EventSource('http://localhost:3000/api/video-overlay/stream');
  es.onmessage = (e) => {
    try { handleCmd(JSON.parse(e.data)); } catch(err) {}
  };
  es.onerror = () => {
    es.close();
    setTimeout(connectSSE, 2000);
  };
}

function handleCmd(msg) {
  const { cmd, loops, x, y, w, h } = msg;
  const id = String(msg.id); // normalize to string key
  const filePath = msg.path;
  if (cmd === 'PLAYVID') {
    playVid(id, filePath, loops || 1, x, y, w, h);
  } else if (cmd === 'CLEARVID') {
    clearVid(id);
  } else if (cmd === 'REMOVEVID') {
    removeVid(id);
  } else if (cmd === 'MOVEVID') {
    moveVid(id, x, y);
  } else if (cmd === 'SIZEVID') {
    sizeVid(id, w, h);
  }
}

function playVid(id, filePath, loops, x, y, w, h) {
  let src = sources[id];
  if (src) {
    // Already exists — stop current playback cleanly before restarting
    src.videoEl.pause();
    src.videoEl.src = '';
    src.loopsDone = 0;
    src.loopsTotal = loops;
  } else {
    // Create new source element
    const el = document.createElement('div');
    el.className = 'vid-source';
    el.dataset.id = id;

    const video = document.createElement('video');
    video.preload = 'auto';
    el.appendChild(video);

    const handle = document.createElement('div');
    handle.className = 'resize-handle';
    el.appendChild(handle);

    document.body.appendChild(el);

    src = sources[id] = { el, videoEl: video, loopsTotal: loops, loopsDone: 0, x: x||200, y: y||200, w: w||400, h: h||300 };

    // Drag
    el.addEventListener('mousedown', (e) => {
      if (e.target === handle) return;
      dragging = id;
      dragOffX = e.clientX - src.x;
      dragOffY = e.clientY - src.y;
      e.preventDefault();
    });

    // Resize
    handle.addEventListener('mousedown', (e) => {
      resizing = id;
      e.preventDefault();
      e.stopPropagation();
    });

    // Loop handler
    video.addEventListener('ended', () => {
      src.loopsDone++;
      if (src.loopsTotal === 0 || src.loopsDone < src.loopsTotal) {
        video.currentTime = 0;
        video.play();
      } else {
        clearVid(id);
        fetch('http://localhost:3000/api/video-overlay/done', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id })
        }).catch(() => {});
      }
    });
  }

  // Update loop settings and position
  src.loopsTotal = loops;
  src.loopsDone = 0;
  if (x !== undefined) src.x = x;
  if (y !== undefined) src.y = y;
  if (w !== undefined) src.w = w;
  if (h !== undefined) src.h = h;

  // Load and play via HTTP (file:/// blocked by Electron security)
  src.videoEl.src = 'http://localhost:3000/api/localfile?path=' + encodeURIComponent(filePath);
  src.videoEl.currentTime = 0;

  // Position
  applyPos(src);
  src.el.style.display = 'block';
  src.el.classList.add('visible');

  src.videoEl.play().catch(() => {});
}

function clearVid(id) {
  const src = sources[id];
  if (!src) return;
  src.videoEl.pause();
  src.videoEl.src = '';
  src.el.style.display = 'none';
  src.el.classList.remove('visible');
}

function removeVid(id) {
  const src = sources[id];
  if (!src) return;
  clearVid(id);
  src.el.remove();
  delete sources[id];
}

function moveVid(id, x, y) {
  const src = sources[id];
  if (!src) return;
  src.x = x; src.y = y;
  applyPos(src);
  // Save position
  savePos(id);
}

function sizeVid(id, w, h) {
  const src = sources[id];
  if (!src) return;
  src.w = w; src.h = h;
  applyPos(src);
  savePos(id);
}

function applyPos(src) {
  src.el.style.left = src.x + 'px';
  src.el.style.top = src.y + 'px';
  src.el.style.width = src.w + 'px';
  src.el.style.height = src.h + 'px';
}

function savePos(id) {
  const src = sources[id];
  if (!src) return;
  fetch('http://localhost:3000/api/video-overlay/savepos', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, x: src.x, y: src.y, w: src.w, h: src.h })
  }).catch(() => {});
}

// ---- Mouse passthrough toggle ----
let mouseOverSource = false;

function setMouseIgnore(ignore) {
  fetch('http://localhost:3000/api/video-overlay/mouse', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ignore })
  }).catch(() => {});
}

// ---- Mouse events for drag/resize ----
document.addEventListener('mousemove', (e) => {
  // Check if over any visible source
  const overSource = Object.values(sources).some(src => {
    if (src.el.style.display === 'none') return false;
    const r = src.el.getBoundingClientRect();
    return e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom;
  });

  if (overSource !== mouseOverSource) {
    mouseOverSource = overSource;
    setMouseIgnore(!overSource);
  }

  if (dragging !== null) {
    const src = sources[dragging];
    if (src) {
      src.x = e.clientX - dragOffX;
      src.y = e.clientY - dragOffY;
      applyPos(src);
    }
  } else if (resizing !== null) {
    const src = sources[resizing];
    if (src) {
      src.w = Math.max(50, e.clientX - src.x);
      src.h = Math.max(50, e.clientY - src.y);
      applyPos(src);
    }
  }
});

document.addEventListener('mouseup', () => {
  if (dragging !== null) { savePos(dragging); dragging = null; }
  if (resizing !== null) { savePos(resizing); resizing = null; }
});

connectSSE();
</script>
</body>
</html>
