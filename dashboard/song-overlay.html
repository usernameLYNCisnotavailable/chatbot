<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Song Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: transparent;
  font-family: 'Inter', sans-serif;
  display: flex;
  align-items: flex-end;
  justify-content: flex-start;
  height: 100vh;
  padding: 24px;
  overflow: hidden;
}

.music-bar {
  position: relative;
  width: 340px;
  height: 56px;
  padding: 0 12px 0 8px;
  background: rgba(20, 10, 40, 0.55);
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.45);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-radius: 999px;
  border: 1px solid rgba(145, 71, 255, 0.3);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  transition: opacity 0.4s ease, transform 0.4s ease;
  opacity: 0;
  transform: translateY(12px);
}

.music-bar.visible {
  opacity: 1;
  transform: translateY(0);
}

.music-bar.hidden {
  opacity: 0;
  transform: translateY(12px);
}

/* thumbnail */
.thumb {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: rgba(145, 71, 255, 0.25);
  border: 1px solid rgba(145, 71, 255, 0.3);
  flex-shrink: 0;
  background-size: cover;
  background-position: center;
  overflow: hidden;
}
.thumb-default {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.thumb-default svg { opacity: 0.6; }

/* song info */
.song-info {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.song-title {
  font-size: 12px;
  font-weight: 600;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.song-requester {
  font-size: 10px;
  color: rgba(191, 148, 255, 0.8);
  font-weight: 400;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* controls */
.music-control {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.music-control svg {
  cursor: pointer;
  opacity: 0.75;
  transition: opacity 0.15s, transform 0.1s;
}
.music-control svg:hover { opacity: 1; }
.music-control svg:active { transform: scale(0.88); }

/* eq bars animation */
.eq {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 16px;
  flex-shrink: 0;
}
.eq-bar {
  width: 3px;
  background: #9147ff;
  border-radius: 2px;
  animation: eq-bounce 0.8s ease-in-out infinite alternate;
}
.eq-bar:nth-child(1) { height: 6px;  animation-delay: 0s; }
.eq-bar:nth-child(2) { height: 12px; animation-delay: 0.15s; }
.eq-bar:nth-child(3) { height: 8px;  animation-delay: 0.3s; }
.eq-bar:nth-child(4) { height: 14px; animation-delay: 0.1s; }
@keyframes eq-bounce {
  from { transform: scaleY(0.4); opacity: 0.5; }
  to   { transform: scaleY(1);   opacity: 1; }
}
</style>
</head>
<body>

<div class="music-bar" id="bar">
  <!-- thumbnail -->
  <div class="thumb" id="thumb">
    <div class="thumb-default">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="rgba(191,148,255,0.8)">
        <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
      </svg>
    </div>
  </div>

  <!-- song info -->
  <div class="song-info">
    <div class="song-title" id="songTitle">No song playing</div>
    <div class="song-requester" id="songRequester">—</div>
  </div>

  <!-- eq animation -->
  <div class="eq" id="eq">
    <div class="eq-bar"></div>
    <div class="eq-bar"></div>
    <div class="eq-bar"></div>
    <div class="eq-bar"></div>
  </div>

  <!-- skip control -->
  <div class="music-control">
    <svg onclick="skipSong()" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" height="22px" width="22px" fill="#ffffff">
      <path d="M0 24q0 0.544 0.288 1.056t0.768 0.736q0.48 0.256 1.056 0.224t0.992-0.32l12-8q0.896-0.608 0.896-1.696t-0.896-1.632l-12-8q-0.448-0.32-0.992-0.352t-1.056 0.224q-0.48 0.256-0.768 0.736t-0.288 1.024v16zM16 24q0 0.544 0.288 1.056t0.768 0.736q0.48 0.256 1.056 0.224t0.992-0.32l12-8q0.896-0.608 0.896-1.696t-0.896-1.632l-12-8q-0.448-0.32-0.992-0.352t-1.056 0.224q-0.48 0.256-0.768 0.736t-0.288 1.024v16z"/>
    </svg>
  </div>
</div>

<script>
const bar         = document.getElementById('bar');
const thumbEl     = document.getElementById('thumb');
const titleEl     = document.getElementById('songTitle');
const requesterEl = document.getElementById('songRequester');
const eqEl        = document.getElementById('eq');

let lastVideoId = null;
let hideTimer   = null;

function skipSong() {
  fetch('/api/songs/skip', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' }).catch(() => {});
}

function setThumb(videoId) {
  if (videoId) {
    thumbEl.style.backgroundImage = `url(https://img.youtube.com/vi/${videoId}/mqdefault.jpg)`;
    thumbEl.innerHTML = '';
  } else {
    thumbEl.style.backgroundImage = '';
    thumbEl.innerHTML = `<div class="thumb-default"><svg width="18" height="18" viewBox="0 0 24 24" fill="rgba(191,148,255,0.8)"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg></div>`;
  }
}

async function poll() {
  try {
    const r = await fetch('/api/songs/queue');
    const d = await r.json();

    if (d.current) {
      clearTimeout(hideTimer);

      if (d.current.videoId !== lastVideoId) {
        // animate out then in for song change
        bar.classList.remove('visible');
        bar.classList.add('hidden');
        setTimeout(() => {
          titleEl.textContent     = d.current.title || 'Unknown';
          requesterEl.textContent = `requested by @${d.current.requester || '?'}`;
          setThumb(d.current.videoId);
          lastVideoId = d.current.videoId;
          bar.classList.remove('hidden');
          bar.classList.add('visible');
        }, 350);
      } else {
        bar.classList.add('visible');
        bar.classList.remove('hidden');
      }

      eqEl.style.display = 'flex';
    } else {
      // no song — fade out after short delay
      eqEl.style.display = 'none';
      if (!hideTimer) {
        hideTimer = setTimeout(() => {
          bar.classList.remove('visible');
          bar.classList.add('hidden');
          lastVideoId = null;
          titleEl.textContent     = 'No song playing';
          requesterEl.textContent = '—';
          setThumb(null);
        }, 2000);
      }
    }
  } catch(e) {}
}

// start
poll();
setInterval(poll, 3000);
</script>
</body>
</html>
