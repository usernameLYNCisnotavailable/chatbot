<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home — ChatCommander</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: #0e0e10;
  color: #efeff1;
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.center-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 22px;
  text-align: center;
  pointer-events: none;
  user-select: none;
}

.home-video {
  height: 220px;
  width: auto;
  object-fit: contain;
  display: block;
  mask-image: linear-gradient(to bottom, black 30%, black 50%, transparent 100%);
  -webkit-mask-image: linear-gradient(to bottom, black 30%, black 50%, transparent 100%);
}

.beta-msg {
  font-size: 13px;
  color: #6b6b7a;
  line-height: 1.7;
  max-width: 320px;
}
</style>
</head>
<body>

<div class="center-wrap">
  <video class="home-video" autoplay muted loop playsinline>
    <source src="/dashboard/head-transparent.webm" type="video/webm">
    <source src="/dashboard/42670-432087053_medium.mp4" type="video/mp4">
  </video>
  <div class="beta-msg">
    Home page isn't ready yet.<br>
    Chances are, if you're seeing this, you're one of the beta testers. 👋
  </div>
</div>

</body>
</html>
