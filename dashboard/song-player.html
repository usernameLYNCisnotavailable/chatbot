<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Song Requests</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0e0e10; --surface: #18181b; --border: rgba(255,255,255,0.08);
    --text: #efeff1; --muted: rgba(255,255,255,0.4); --muted-2: rgba(255,255,255,0.2);
    --accent: #9147ff; --green: #00c853; --red: #eb0400;
  }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  #titlebar {
    height: 36px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 14px;
    -webkit-app-region: drag;
    flex-shrink: 0;
    gap: 8px;
  }
  #titlebar-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted-2);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  #status-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--muted-2);
    flex-shrink: 0;
  }
  #status-dot.playing { background: var(--green); box-shadow: 0 0 6px var(--green); }
  #status-dot.paused  { background: rgba(255,255,255,0.3); }

  #close-btn {
    -webkit-app-region: no-drag;
    background: none;
    border: none;
    color: var(--muted-2);
    font-size: 15px;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    line-height: 1;
    margin-left: auto;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  #close-btn:hover { color: rgba(255,80,80,0.8); }

  #main {
    display: flex;
    flex-direction: column;
    height: calc(100% - 36px);
    overflow: hidden;
  }

  #yt-container {
    position: absolute;
    width: 1px; height: 1px;
    opacity: 0;
    pointer-events: none;
    overflow: hidden;
  }

  /* Now playing */
  #now-playing {
    padding: 18px 18px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #np-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted-2);
    margin-bottom: 10px;
  }

  #np-title {
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,0.25);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  #np-requester {
    font-size: 11px;
    color: var(--muted-2);
    margin-bottom: 14px;
  }

  /* Progress — transparent track, white line */
  #progress-wrap {
    height: 2px;
    background: rgba(255,255,255,0.08);
    border-radius: 1px;
    overflow: hidden;
    margin-bottom: 16px;
    display: none;
  }
  #progress-bar {
    height: 100%;
    width: 0%;
    background: rgba(255,255,255,0.65);
    border-radius: 1px;
    transition: width 1s linear;
  }

  /* Controls — Apple transparent pill buttons */
  #controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .pill-btn {
    -webkit-app-region: no-drag;
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 14px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif;
    backdrop-filter: blur(10px);
  }
  .pill-btn:hover {
    background: rgba(255,255,255,0.13);
    color: rgba(255,255,255,0.9);
    border-color: rgba(255,255,255,0.18);
  }
  .pill-btn.danger:hover {
    background: rgba(235,4,0,0.15);
    color: rgba(255,90,90,0.9);
    border-color: rgba(235,4,0,0.25);
  }

  #volume-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
    -webkit-app-region: no-drag;
  }
  #volume-wrap span { font-size: 11px; color: var(--muted-2); }
  #vol-slider {
    -webkit-appearance: none;
    width: 60px;
    height: 2px;
    background: rgba(255,255,255,0.12);
    border-radius: 1px;
    outline: none;
    cursor: pointer;
    -webkit-app-region: no-drag;
  }
  #vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.7);
    cursor: pointer;
  }

  /* Queue */
  #queue-header {
    padding: 10px 18px 8px;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted-2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  #queue-count { font-size: 10px; color: rgba(145,71,255,0.7); font-weight: 600; }

  #queue-section { flex: 1; overflow-y: auto; overflow-x: hidden; }
  #queue-section::-webkit-scrollbar { width: 3px; }
  #queue-section::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

  .queue-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.1s;
  }
  .queue-item:hover { background: rgba(255,255,255,0.03); }
  .queue-pos { font-size: 10px; color: var(--muted-2); min-width: 14px; text-align: center; }
  .queue-info { flex: 1; min-width: 0; }
  .queue-title { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.7); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .queue-requester { font-size: 10px; color: var(--muted-2); margin-top: 2px; }
  .queue-remove {
    background: none; border: none; color: var(--muted-2); cursor: pointer;
    font-size: 12px; padding: 2px 5px; border-radius: 4px;
    -webkit-app-region: no-drag; flex-shrink: 0;
    opacity: 0; transition: opacity 0.1s, color 0.1s;
  }
  .queue-item:hover .queue-remove { opacity: 1; }
  .queue-remove:hover { color: rgba(235,100,100,0.8); }

  #queue-empty {
    padding: 24px 18px;
    font-size: 11px;
    color: var(--muted-2);
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div id="titlebar">
  <div id="status-dot"></div>
  <span id="titlebar-title">Song Requests</span>
  <button id="close-btn" onclick="fetch('/api/songs/close',{method:'POST'}).catch(()=>{})">✕</button>
</div>

<div id="main">
  <div id="yt-container"><div id="yt-player"></div></div>

  <div id="now-playing">
    <div id="np-label">Now Playing</div>
    <div id="np-title">Nothing playing</div>
    <div id="np-requester"></div>
    <div id="progress-wrap"><div id="progress-bar"></div></div>
    <div id="controls">
      <button class="pill-btn" id="btn-skip" onclick="skip()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
        Skip
      </button>
      <button class="pill-btn danger" id="btn-clear" onclick="clearQueue()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        Clear
      </button>
      <div id="volume-wrap">
        <span>🔊</span>
        <input type="range" id="vol-slider" min="0" max="100" value="80" oninput="setVolume(this.value)">
      </div>
    </div>
  </div>

  <div id="queue-header">
    <span>Up Next</span>
    <span id="queue-count"></span>
  </div>
  <div id="queue-section">
    <div id="queue-list"></div>
    <div id="queue-empty">Queue is empty<br><span style="opacity:0.5;">!sr &lt;youtube url&gt; to add</span></div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  let player = null;
  let currentSong = null;
  let songStartTime = 0;
  let progressInterval = null;
  let pollInterval = null;
  let volume = 80;
  let lastQueueJson = '';
  let lastCurrentJson = '';
  let playerReady = false;
  let pendingSong = null;

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('yt-player', {
      width: '1', height: '1',
      playerVars: { autoplay: 1, controls: 0, disablekb: 1 },
      events: {
        onReady: () => {
          playerReady = true;
          player.setVolume(volume);
          startPolling();
          if (pendingSong) { playSong(pendingSong); pendingSong = null; }
        },
        onStateChange: (e) => {
          if (e.data === YT.PlayerState.PLAYING) {
            document.getElementById('status-dot').className = 'playing';
            document.getElementById('progress-wrap').style.display = 'block';
            startProgress();
          }
          if (e.data === YT.PlayerState.PAUSED || e.data === YT.PlayerState.BUFFERING) {
            document.getElementById('status-dot').className = 'paused';
          }
          // Auto-loop: when song ends, notify server to advance queue
          if (e.data === YT.PlayerState.ENDED) {
            const elapsed = (Date.now() - songStartTime) / 1000;
            if (elapsed > 5) songDone();
          }
        }
      }
    });
  }

  function startPolling() {
    if (pollInterval) clearInterval(pollInterval);
    poll();
    pollInterval = setInterval(poll, 2000);
  }

  function poll() {
    fetch('/api/songs/queue').then(r => r.json()).then(data => {
      const curJson = JSON.stringify(data.current || null);
      const qJson = JSON.stringify(data.queue || []);

      if (curJson !== lastCurrentJson) {
        lastCurrentJson = curJson;
        if (data.current) {
          if (!currentSong || currentSong.videoId !== data.current.videoId) {
            if (playerReady) playSong(data.current);
            else pendingSong = data.current;
          }
        } else {
          stopCurrent();
        }
      }

      if (qJson !== lastQueueJson) {
        lastQueueJson = qJson;
        renderQueue(data.queue || []);
      }
    }).catch(() => {});
  }

  function playSong(song) {
    currentSong = song;
    songStartTime = Date.now();
    player.loadVideoById({ videoId: song.videoId });
    player.setVolume(volume);
    document.getElementById('np-title').textContent = song.title || song.videoId;
    document.getElementById('np-title').style.color = 'rgba(255,255,255,0.85)';
    document.getElementById('np-requester').textContent = 'requested by @' + song.requester;
    document.getElementById('status-dot').className = 'playing';
  }

  function stopCurrent() {
    currentSong = null;
    if (player && player.stopVideo) player.stopVideo();
    document.getElementById('np-title').textContent = 'Nothing playing';
    document.getElementById('np-title').style.color = 'rgba(255,255,255,0.25)';
    document.getElementById('np-requester').textContent = '';
    document.getElementById('status-dot').className = '';
    document.getElementById('progress-wrap').style.display = 'none';
    document.getElementById('progress-bar').style.width = '0%';
    stopProgress();
  }

  function startProgress() {
    stopProgress();
    progressInterval = setInterval(() => {
      if (!player || !player.getCurrentTime) return;
      const cur = player.getCurrentTime() || 0;
      const dur = player.getDuration() || 0;
      if (dur > 0) document.getElementById('progress-bar').style.width = ((cur / dur) * 100) + '%';
    }, 500);
  }

  function stopProgress() {
    if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
  }

  function songDone() {
    stopProgress();
    currentSong = null;
    lastCurrentJson = '';
    document.getElementById('status-dot').className = '';
    fetch('/api/songs/done', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' })
      .then(() => poll()) // immediately poll so next song loads fast
      .catch(() => {});
  }

  function skip() {
    fetch('/api/songs/skip', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' })
      .then(() => { lastCurrentJson = ''; poll(); })
      .catch(() => {});
  }

  function clearQueue() {
    if (!confirm('Clear the entire queue?')) return;
    fetch('/api/songs/clear', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' })
      .then(() => { lastCurrentJson = ''; lastQueueJson = ''; poll(); })
      .catch(() => {});
  }

  function setVolume(v) {
    volume = parseInt(v);
    if (player && player.setVolume) player.setVolume(volume);
  }

  function renderQueue(queue) {
    const list = document.getElementById('queue-list');
    const empty = document.getElementById('queue-empty');
    const count = document.getElementById('queue-count');
    count.textContent = queue.length ? queue.length + ' song' + (queue.length !== 1 ? 's' : '') : '';
    if (!queue.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    list.innerHTML = queue.map((s, i) => `
      <div class="queue-item">
        <span class="queue-pos">${i + 1}</span>
        <div class="queue-info">
          <div class="queue-title">${esc(s.title || s.videoId)}</div>
          <div class="queue-requester">@${esc(s.requester)}</div>
        </div>
        <button class="queue-remove" onclick="removeFromQueue(${i})">✕</button>
      </div>
    `).join('');
  }

  function removeFromQueue(index) {
    fetch('/api/songs/queue/' + index, { method: 'DELETE' }).then(() => { lastQueueJson = ''; poll(); }).catch(() => {});
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
