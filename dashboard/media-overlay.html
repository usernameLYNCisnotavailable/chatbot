<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100vw; height: 100vh;
    background: transparent;
    overflow: hidden;
  }
  .media-source {
    position: absolute;
    overflow: hidden;
    display: none;
  }
  /* canvas fills the container; img/video used as off-screen source, hidden */
  .media-source canvas {
    width: 100%; height: 100%;
    display: block;
  }
  .media-source .resize-handle {
    position: absolute;
    bottom: 0; right: 0;
    width: 20px; height: 20px;
    background: rgba(255,255,255,0.8);
    cursor: se-resize;
  }
  .media-source.visible {
    /* no outline */
  }
</style>
</head>
<body>
<script>
const sources = {};
// id -> { el, canvas, ctx, mediaEl, kind ('video'|'image'), loopsTotal, loopsDone,
//         clearTimer, x, y, w, h, videoStart, videoEnd,
//         chromaKey, chromaColor(hex), chromaR, chromaG, chromaB, chromaThreshold,
//         rafId (requestAnimationFrame id for video chroma loop) }

let dragging = null, resizing = null;
let dragOffX = 0, dragOffY = 0;

// ---- Chroma helpers ----
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return { r, g, b };
}

// Draw a single frame from mediaEl onto canvas, applying chroma key if enabled.
// For images: called once on load. For videos: called every animation frame.
function drawFrame(src) {
  const { canvas, ctx, mediaEl, chromaKey, chromaR, chromaG, chromaB, chromaThreshold } = src;
  const W = canvas.width;
  const H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.drawImage(mediaEl, 0, 0, W, H);

  if (!chromaKey) return; // no processing needed

  const imageData = ctx.getImageData(0, 0, W, H);
  const data = imageData.data;
  // Scale slider (0-100) to full RGB distance range (0-441 = sqrt(255²×3))
  const scaled = (chromaThreshold / 100) * 441;
  const tSq = scaled * scaled;

  for (let i = 0; i < data.length; i += 4) {
    const dr = data[i]   - chromaR;
    const dg = data[i+1] - chromaG;
    const db = data[i+2] - chromaB;
    if (dr*dr + dg*dg + db*db <= tSq) {
      data[i+3] = 0; // zero alpha
    }
  }
  ctx.putImageData(imageData, 0, 0);
}

// Continuous per-frame loop for video chroma key
function videoChromaLoop(id) {
  const src = sources[id];
  if (!src || src.kind !== 'video' || src.mediaEl.paused || src.mediaEl.ended) return;
  drawFrame(src);
  src.rafId = requestAnimationFrame(() => videoChromaLoop(id));
}

function stopRaf(src) {
  if (src.rafId) { cancelAnimationFrame(src.rafId); src.rafId = null; }
}

// ---- SSE connection ----
function connectSSE() {
  const es = new EventSource('http://localhost:3000/api/video-overlay/stream');
  es.onmessage = (e) => {
    try { handleCmd(JSON.parse(e.data)); } catch(err) {}
  };
  es.onerror = () => { es.close(); setTimeout(connectSSE, 2000); };
}

function handleCmd(msg) {
  const id = String(msg.id);
  const { cmd, x, y, w, h } = msg;
  const chroma = { chromaKey: msg.chromaKey || false, chromaColor: msg.chromaColor || '#00ff00', chromaThreshold: msg.chromaThreshold ?? 40 };

  if      (cmd === 'PLAYVID')   playVid(id, msg.path, msg.loops||1, x, y, w, h, msg.videoStart||0, msg.videoEnd||0, msg.volume ?? 1, chroma);
  else if (cmd === 'CLEARVID')  clearSource(id);
  else if (cmd === 'REMOVEVID') removeSource(id);
  else if (cmd === 'MOVEVID')   moveSource(id, x, y);
  else if (cmd === 'SIZEVID')   sizeSource(id, w, h);
  else if (cmd === 'PLAYIMG')   playImg(id, msg.path, msg.loops||1, x, y, w, h, msg.displaySeconds||0, chroma);
  else if (cmd === 'CLEARIMG')  clearSource(id);
  else if (cmd === 'REMOVEIMG') removeSource(id);
  else if (cmd === 'MOVEIMG')   moveSource(id, x, y);
  else if (cmd === 'SIZEIMG')   sizeSource(id, w, h);
  else if (cmd === 'PLAYSOUND') playSound(msg.path, msg.startMs || 0, msg.endMs || 0, msg.id || msg.path, msg.volume ?? 1, msg.isTTS || false, msg.ttsSourceId || null, msg.clearMediaId || null, msg.clearMediaKind || null);
  else if (cmd === 'STOPSOUND') stopSound(String(msg.id));
  else if (cmd === 'STOPALL')   stopAll();
}

const activeSounds = {};

function playSound(filePath, startMs, endMs, id, volume, isTTS, ttsSourceId, clearMediaId, clearMediaKind) {
  id = id !== undefined ? String(id) : undefined;
  const existing = activeSounds[id];
  if (existing) { try { existing.pause(); } catch(e) {} delete activeSounds[id]; }

  const audio = new Audio('http://localhost:3000/api/localfile?path=' + encodeURIComponent(filePath));
  audio.volume = (volume !== undefined && !isNaN(volume)) ? Math.min(1, Math.max(0, volume)) : 1;
  if (id) activeSounds[id] = audio;
  audio.currentTime = startMs / 1000;
  audio.play().catch(() => {});

  function onSoundDone() {
    if (id) delete activeSounds[id];
    if (isTTS && ttsSourceId) {
      // Notify server that TTS audio finished — server broadcasts TEXTDONE to dashboard
      fetch('http://localhost:3000/api/video-overlay/done', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cmd: 'TEXTDONE', id: ttsSourceId, clearMediaId: clearMediaId || null, clearMediaKind: clearMediaKind || null })
      }).catch(() => {});
    }
  }

  if (endMs > startMs) {
    const checkInterval = setInterval(() => {
      if (audio.currentTime >= endMs / 1000) {
        audio.pause();
        clearInterval(checkInterval);
        onSoundDone();
      }
    }, 50);
    audio.addEventListener('ended', () => { clearInterval(checkInterval); onSoundDone(); });
  } else {
    audio.addEventListener('ended', onSoundDone);
  }
}

// ---- Shared element creation ----
// Creates the container div with a <canvas> for display.
// The actual <img> or <video> is kept off-screen as a source for drawImage().
function createSourceEl(id, kind, x, y, w, h) {
  const el = document.createElement('div');
  el.className = 'media-source';
  el.dataset.id = id;

  // Visible canvas
  const canvas = document.createElement('canvas');
  // Canvas resolution — use a reasonable fixed resolution; CSS stretches it to fit.
  canvas.width  = 1280;
  canvas.height = 720;
  el.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  // Media element — for video without chroma, displayed directly inside el (no canvas overhead).
  // For video with chroma or static images, used as drawImage source into canvas.
  const mediaEl = document.createElement(kind === 'video' ? 'video' : 'img');
  mediaEl.style.cssText = 'display:none;position:absolute;top:0;left:0;width:100%;height:100%;object-fit:fill;';
  mediaEl.crossOrigin = 'anonymous';
  if (kind === 'video') { mediaEl.preload = 'auto'; }
  el.appendChild(mediaEl); // inside el so it sizes with the container

  const handle = document.createElement('div');
  handle.className = 'resize-handle';
  el.appendChild(handle);

  document.body.appendChild(el);

  const px = x||200, py = y||200, pw = w||400, ph = h||300;

  const src = sources[id] = {
    el, canvas, ctx, mediaEl, kind,
    loopsTotal: 1, loopsDone: 0,
    clearTimer: null,
    videoStart: 0, videoEnd: 0,
    chromaKey: false, chromaColor: '#00ff00',
    chromaR: 0, chromaG: 255, chromaB: 0, chromaThreshold: 40,
    rafId: null,
    x: px, y: py, w: pw, h: ph
  };

  el.addEventListener('mousedown', (e) => {
    if (e.target === handle) return;
    dragging = id;
    dragOffX = e.clientX - src.x;
    dragOffY = e.clientY - src.y;
    e.preventDefault();
  });
  handle.addEventListener('mousedown', (e) => {
    resizing = id;
    e.preventDefault();
    e.stopPropagation();
  });

  return src;
}

function applyChroma(src, chroma) {
  src.chromaKey = chroma.chromaKey || false;
  src.chromaColor = chroma.chromaColor || '#00ff00';
  src.chromaThreshold = chroma.chromaThreshold || 40;
  if (src.chromaKey) {
    const rgb = hexToRgb(src.chromaColor);
    src.chromaR = rgb.r; src.chromaG = rgb.g; src.chromaB = rgb.b;
  }
}

// ---- Video playback ----
function playVid(id, filePath, loops, x, y, w, h, videoStart, videoEnd, volume, chroma) {
  let src = sources[id];
  if (src && src.kind !== 'video') { removeSource(id); src = null; }

  // Always recreate mediaEl on re-trigger to avoid stale listener accumulation
  if (src) {
    stopRaf(src);
    src.mediaEl.pause();
    src.mediaEl.src = '';
    src.mediaEl.load();
    src.mediaEl.remove();
    const newMedia = document.createElement('video');
    newMedia.style.cssText = 'display:none;position:absolute;top:0;left:0;width:100%;height:100%;object-fit:fill;';
    newMedia.crossOrigin = 'anonymous';
    newMedia.preload = 'auto';
    src.el.appendChild(newMedia);
    src.mediaEl = newMedia;
    src.loopsDone = 0;
  } else {
    src = createSourceEl(id, 'video', x, y, w, h);
  }

  // Trim / loop handler (timeupdate only needed for trim; ended handles normal loop)
  src.mediaEl.addEventListener('timeupdate', () => {
    const end = src.videoEnd;
    if (end > 0 && src.mediaEl.currentTime >= end) {
      src.loopsDone++;
      if (src.loopsTotal === 0 || src.loopsDone < src.loopsTotal) {
        src.mediaEl.currentTime = src.videoStart || 0;
        src.mediaEl.play();
      } else {
        stopRaf(src);
        clearSource(id);
        notifyDone(id);
      }
    }
  });

  src.mediaEl.addEventListener('ended', () => {
    src.loopsDone++;
    if (src.loopsTotal === 0 || src.loopsDone < src.loopsTotal) {
      src.mediaEl.currentTime = src.videoStart || 0;
      src.mediaEl.play();
    } else {
      stopRaf(src);
      clearSource(id);
      notifyDone(id);
    }
  });

  applyChroma(src, chroma);
  src.loopsTotal = loops;
  src.loopsDone = 0;
  src.videoStart = videoStart || 0;
  src.videoEnd   = videoEnd   || 0;
  if (x !== undefined) src.x = x;
  if (y !== undefined) src.y = y;
  if (w !== undefined) src.w = w;
  if (h !== undefined) src.h = h;

  src.mediaEl.src = 'http://localhost:3000/api/localfile?path=' + encodeURIComponent(filePath);
  src.mediaEl.volume = (volume !== undefined && !isNaN(volume)) ? Math.min(1, Math.max(0, volume)) : 1;
  applyPos(src);
  src.el.style.display = 'block';
  src.el.classList.add('visible');

  const startPlay = () => {
    if (src.chromaKey) {
      // Chroma ON: hide video element, show canvas, run rAF pixel-scan loop
      src.mediaEl.style.display = 'none';
      src.canvas.style.display = 'block';
      videoChromaLoop(id);
    } else {
      // Chroma OFF: show video element directly — no canvas overhead at all
      src.canvas.style.display = 'none';
      src.mediaEl.style.display = 'block';
    }
  };

  if (src.videoStart > 0) {
    src.mediaEl.addEventListener('loadedmetadata', function onMeta() {
      src.mediaEl.removeEventListener('loadedmetadata', onMeta);
      src.mediaEl.currentTime = src.videoStart;
      src.mediaEl.play().catch(() => {}).then(startPlay);
    });
  } else {
    src.mediaEl.currentTime = 0;
    src.mediaEl.play().catch(() => {}).then(startPlay);
  }
}

// ---- Image/GIF playback ----
function playImg(id, filePath, loops, x, y, w, h, displaySeconds, chroma) {
  const isGif = filePath.toLowerCase().endsWith('.gif');

  let src = sources[id];
  if (src && src.kind !== 'image') { removeSource(id); src = null; }

  if (src) {
    if (src.clearTimer) { clearTimeout(src.clearTimer); src.clearTimer = null; }
    src.loopsDone = 0;
  } else {
    src = createSourceEl(id, 'image', x, y, w, h);
  }

  applyChroma(src, chroma);
  src.loopsTotal = loops;
  src.loopsDone = 0;
  src.isGif = isGif;
  if (x !== undefined) src.x = x;
  if (y !== undefined) src.y = y;
  if (w !== undefined) src.w = w;
  if (h !== undefined) src.h = h;

  if (isGif) {
    // GIFs: use a separate visible <img> inside el — canvas can't animate GIFs
    // Remove any previous gif img if re-triggering
    const existing = src.el.querySelector('img.gif-el');
    if (existing) existing.remove();
    const gifImg = document.createElement('img');
    gifImg.className = 'gif-el';
    gifImg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;object-fit:fill;display:block;';
    gifImg.src = 'http://localhost:3000/api/localfile?path=' + encodeURIComponent(filePath);
    src.el.appendChild(gifImg);
    src.canvas.style.display = 'none';
    src.gifImg = gifImg;
  } else {
    // Static images: use canvas (supports chroma key)
    if (src.gifImg) { src.gifImg.remove(); src.gifImg = null; }
    src.canvas.style.display = 'block';
    src.mediaEl.style.display = 'none';
    src.mediaEl.onload = () => { drawFrame(src); };
    src.mediaEl.src = 'http://localhost:3000/api/localfile?path=' + encodeURIComponent(filePath);
  }

  applyPos(src);
  src.el.style.display = 'block';
  src.el.classList.add('visible');

  // Auto-clear based on displaySeconds. 0 = show forever (or until TTS clears it).
  if (displaySeconds > 0) {
    src.clearTimer = setTimeout(() => {
      clearSource(id);
      notifyDone(id);
    }, displaySeconds * 1000);
  }
}

// ---- Shared clear / remove / move / size ----
function stopSound(id) {
  const a = activeSounds[id];
  if (a) { try { a.pause(); } catch(e) {} delete activeSounds[id]; }
}

function stopAll() {
  Object.keys(sources).forEach(id => clearSource(id));
  Object.values(activeSounds).forEach(a => { try { a.pause(); } catch(e) {} });
  for (const k in activeSounds) delete activeSounds[k];
}

function clearSource(id) {
  const src = sources[id];
  if (!src) return;
  stopRaf(src);
  if (src.clearTimer) { clearTimeout(src.clearTimer); src.clearTimer = null; }
  if (src.kind === 'video') { src.mediaEl.pause(); src.mediaEl.src = ''; }
  else { src.mediaEl.src = ''; src.mediaEl.style.display = 'none'; }
  if (src.gifImg) { src.gifImg.src = ''; src.gifImg.style.display = 'none'; }
  src.ctx.clearRect(0, 0, src.canvas.width, src.canvas.height);
  src.canvas.style.display = 'block';
  src.el.style.display = 'none';
  src.el.classList.remove('visible');
}

function removeSource(id) {
  const src = sources[id];
  if (!src) return;
  clearSource(id);
  src.mediaEl.remove();
  src.el.remove();
  delete sources[id];
}

function moveSource(id, x, y) {
  const src = sources[id];
  if (!src) return;
  src.x = x; src.y = y;
  applyPos(src);
  savePos(id);
}

function sizeSource(id, w, h) {
  const src = sources[id];
  if (!src) return;
  src.w = w; src.h = h;
  applyPos(src);
  savePos(id);
}

function applyPos(src) {
  src.el.style.left   = (src.x || 0) + 'px';
  src.el.style.top    = (src.y || 0) + 'px';
  src.el.style.width  = (src.w || 400) + 'px';
  src.el.style.height = (src.h || 300) + 'px';
}

function savePos(id) {
  const src = sources[id];
  if (!src) return;
  fetch('http://localhost:3000/api/video-overlay/savepos', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, x: src.x, y: src.y, w: src.w, h: src.h })
  }).catch(() => {});
}

function notifyDone(id) {
  fetch('http://localhost:3000/api/video-overlay/done', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id })
  }).catch(() => {});
}

// ---- Mouse passthrough ----
let mouseOverSource = false;

document.addEventListener('mousemove', (e) => {
  const overSource = Object.values(sources).some(src => {
    if (src.el.style.display === 'none') return false;
    const r = src.el.getBoundingClientRect();
    return e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom;
  });

  if (overSource !== mouseOverSource) {
    mouseOverSource = overSource;
    fetch('http://localhost:3000/api/video-overlay/mouse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ignore: !overSource })
    }).catch(() => {});
  }

  if (dragging !== null) {
    const src = sources[dragging];
    if (src) { src.x = e.clientX - dragOffX; src.y = e.clientY - dragOffY; applyPos(src); }
  } else if (resizing !== null) {
    const src = sources[resizing];
    if (src) { src.w = Math.max(50, e.clientX - src.x); src.h = Math.max(50, e.clientY - src.y); applyPos(src); }
  }
});

document.addEventListener('mouseup', () => {
  if (dragging !== null) { savePos(dragging); dragging = null; }
  if (resizing !== null) { savePos(resizing); resizing = null; }
});

// Signal ready
fetch('http://localhost:3000/api/video-overlay/done', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({ type: 'ready' })
}).catch(() => {});

connectSSE();
</script>
</body>
</html>
