<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100vw; height: 100vh;
    background: transparent;
    overflow: hidden;
    pointer-events: none;
  }
  .txt-source {
    position: absolute;
    display: none;
    pointer-events: none;
    white-space: pre-wrap;
    word-break: break-word;
    overflow: hidden;
  }
  .txt-source.visible { display: block; }

  @keyframes txt-fadein {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes txt-scroll {
    from { transform: translateX(-110%); }
    to   { transform: translateX(110vw); }
  }
</style>
</head>
<body>
<script>
const sources = {};

// ---- Voice setup ----
let voicesLoaded = [];
function loadVoices() {
  voicesLoaded = window.speechSynthesis.getVoices();
}
loadVoices();
window.speechSynthesis.onvoiceschanged = loadVoices;

function getVoice(name) {
  if (!name) return null;
  return voicesLoaded.find(v => v.name === name) || null;
}

function speak(text, voiceName, rate, pitch, volume) {
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  const v = getVoice(voiceName);
  if (v) utt.voice = v;
  utt.rate   = rate   || 1;
  utt.pitch  = pitch  || 1;
  utt.volume = (volume !== undefined && !isNaN(volume)) ? Math.min(1, Math.max(0, volume)) : 1;
  window.speechSynthesis.speak(utt);
}

// ---- SSE ----
function connectSSE() {
  const es = new EventSource('http://localhost:3000/api/text-overlay/stream');
  es.onmessage = (e) => {
    try { handleCmd(JSON.parse(e.data)); } catch(err) {}
  };
  es.onerror = () => { es.close(); setTimeout(connectSSE, 2000); };
}

function handleCmd(msg) {
  const id = String(msg.id);
  if      (msg.cmd === 'ADDTEXT')    addText(id, msg);
  else if (msg.cmd === 'CLEARTEXT')  clearText(id);
  else if (msg.cmd === 'REMOVETEXT') removeText(id);
  else if (msg.cmd === 'MOVETEXT')   moveText(id, msg.x, msg.y);
  else if (msg.cmd === 'GETVOICES')  sendVoices();
}

function sendVoices() {
  const voices = voicesLoaded.map(v => ({ name: v.name, lang: v.lang }));
  fetch('http://localhost:3000/api/text-overlay/voices', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ voices })
  }).catch(() => {});
}

function addText(id, cfg) {
  if (sources[id]) removeText(id);

  const el = document.createElement('div');
  el.className = 'txt-source';
  el.dataset.id = id;

  el.style.left        = (cfg.x || 100) + 'px';
  el.style.top         = (cfg.y || 100) + 'px';
  el.style.maxWidth    = (cfg.maxW || 600) + 'px';
  el.style.maxHeight   = (cfg.maxH || 0) > 0 ? cfg.maxH + 'px' : '';
  el.style.overflow    = (cfg.maxH || 0) > 0 ? 'hidden' : '';
  el.style.fontFamily  = cfg.font || 'Arial';
  el.style.fontSize    = (cfg.size || 32) + 'px';
  el.style.color       = cfg.color || '#ffffff';
  el.style.fontWeight  = cfg.bold   ? 'bold'   : 'normal';
  el.style.fontStyle   = cfg.italic ? 'italic' : 'normal';
  el.style.textShadow  = cfg.shadow ? '2px 2px 6px rgba(0,0,0,0.8)' : 'none';
  el.style.lineHeight  = '1.2';
  el.textContent = cfg.text || '';

  document.body.appendChild(el);
  sources[id] = { el, cfg };

  // Auto-shrink font to fit within maxH boundary.
  // Measure with visibility:hidden + display:block so scrollHeight is accurate,
  // then restore before the animation block takes over.
  if ((cfg.maxH || 0) > 0) {
    el.style.visibility = 'hidden';
    el.style.display = 'block';
    el.style.maxHeight = '';
    el.style.overflow = 'visible';
    let fontSize = cfg.size || 32;
    while (el.scrollHeight > cfg.maxH && fontSize > 6) {
      fontSize -= 0.5;
      el.style.fontSize = fontSize + 'px';
    }
    el.style.maxHeight = cfg.maxH + 'px';
    el.style.overflow = 'hidden';
    el.style.display = '';
    el.style.visibility = '';
  }

  // Animation — skip rendering entirely if speakOnly (voice fires but nothing visible)
  const anim = cfg.animation || 'static';
  if (!cfg.speakOnly) {
    el.classList.add('visible');
    if (anim === 'fade') {
    el.style.opacity = '0';
    el.style.animation = 'txt-fadein ' + (cfg.animDuration || 1) + 's ease forwards';
  } else if (anim === 'typewriter') {
    const full = cfg.text || '';
    el.textContent = '';
    el.style.opacity = '1';
    let i = 0;
    const speed = cfg.animDuration ? Math.round((cfg.animDuration * 1000) / full.length) : 50;
    const timer = setInterval(() => {
      el.textContent = full.slice(0, ++i);
      if (i >= full.length) clearInterval(timer);
    }, speed);
    sources[id].typeTimer = timer;
  } else if (anim === 'scroll') {
    el.style.top = (cfg.y || 100) + 'px';
    el.style.left = '0px';
    el.style.maxWidth = 'none';
    el.style.whiteSpace = 'nowrap';
    const dur = cfg.animDuration || 8;
    el.style.animation = 'txt-scroll ' + dur + 's linear forwards';
    el.addEventListener('animationend', () => {
      el.style.animation = 'none';
      el.style.transform = 'none';
      el.style.left = (cfg.x || 100) + 'px';
    }, { once: true });
  } else {
    el.style.opacity = '1';
  }
  } // end if (!cfg.speakOnly)

  // TTS — speak the text if enabled
  if (cfg.speak && cfg.text) {
    const isTTSMonster = (cfg.voice || '').startsWith('ttsm:');

    if (isTTSMonster) {
      fetch('http://localhost:3000/api/tts/speak', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          text:           cfg.text,
          voice:          cfg.voice,
          ttsVolume:      cfg.ttsVolume ?? 1,
          id:             cfg.id,
          clearMediaId:   cfg.clearMediaId   || null,
          clearMediaKind: cfg.clearMediaKind || null
        })
      }).then(r => r.json()).then(data => {
        if (!data.ok) {
          setTimeout(() => { if (sources[id]) clearText(id); }, 3000);
        }
      }).catch(() => {
        setTimeout(() => { if (sources[id]) clearText(id); }, 3000);
      });

    } else {
      window.speechSynthesis.cancel();
      const voiceName = (cfg.voice || '').replace(/^win:/, '');
      const utt = new SpeechSynthesisUtterance(cfg.text);
      const v = getVoice(voiceName);
      if (v) utt.voice = v;
      utt.rate   = cfg.ttsRate   || 1;
      utt.pitch  = cfg.ttsPitch  || 1;
      utt.volume = (cfg.ttsVolume !== undefined && !isNaN(cfg.ttsVolume)) ? Math.min(1, Math.max(0, cfg.ttsVolume)) : 1;

      const onDone = () => {
        if (!sources[id]) return;
        clearText(id);
        fetch('http://localhost:3000/api/video-overlay/done', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cmd: 'TEXTDONE', id: cfg.id, clearMediaId: cfg.clearMediaId || null, clearMediaKind: cfg.clearMediaKind || null })
        }).catch(() => {});
      };

      utt.onend = onDone;
      window.speechSynthesis.speak(utt);
      sources[id].utt = utt;

      const poll = setInterval(() => {
        if (!window.speechSynthesis.speaking && !window.speechSynthesis.pending) {
          clearInterval(poll);
          if (sources[id]) sources[id].pollInterval = null;
          onDone();
        }
      }, 200);
      sources[id].pollInterval = poll;
    }
  }
}

function clearText(id) {
  const src = sources[id];
  if (!src) return;
  if (src.typeTimer) clearInterval(src.typeTimer);
  if (src.pollInterval) { clearInterval(src.pollInterval); src.pollInterval = null; }
  if (src.cfg.speak) window.speechSynthesis.cancel();
  src.el.classList.remove('visible');
  src.el.style.display = 'none';
}

function removeText(id) {
  const src = sources[id];
  if (!src) return;
  if (src.typeTimer) clearInterval(src.typeTimer);
  if (src.pollInterval) { clearInterval(src.pollInterval); src.pollInterval = null; }
  if (src.cfg.speak) window.speechSynthesis.cancel();
  src.el.remove();
  delete sources[id];
}

function moveText(id, x, y) {
  const src = sources[id];
  if (!src) return;
  src.el.style.left = x + 'px';
  src.el.style.top  = y + 'px';
  src.cfg.x = x;
  src.cfg.y = y;
}

connectSSE();
</script>
</body>
</html>
